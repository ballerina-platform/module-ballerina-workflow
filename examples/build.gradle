import org.apache.tools.ant.taskdefs.condition.Os

// Map of example directory names to their Ballerina package names
def examplePackageNames = [
    'get-started'        : 'get_started',
    'error-propagation'  : 'error_propagation',
    'error-fallback'     : 'error_fallback',
    'error-compensation' : 'error_compensation',
    'graceful-completion': 'graceful_completion',
    'human-in-the-loop'  : 'human_in_the_loop',
    'alternative-wait'   : 'alternative_wait',
    'wait-for-all'       : 'wait_for_all',
    'forward-recovery'   : 'forward_recovery',
    'order-processing'   : 'order_processing',
    'order-with-payment' : 'order_with_payment'
]

def ballerinaDistributionVersion = project.rootProject.findProperty("ballerinaLangVersion") ?: "2201.13.2"

// Helper: generate a Ballerina.toml for an example
def generateExampleToml = { String packageName ->
    return """[package]
org = "ballerina_examples"
name = "${packageName}"
version = "0.1.0"
distribution = "${ballerinaDistributionVersion}"

[build-options]
observabilityIncluded = true
"""
}

// Examples whose main() exits on its own (non-HTTP, non-listener).
// These are run with `bal run` as a smoke test to verify that the
// compiler-plugin-generated __registerWorkflowsAndStart() function
// works correctly at runtime — not just during `bal test`.
def runnableExamples = [
    'get-started'
]

task buildExamples {
    description = 'Builds and tests all example projects using the locally built workflow module'
    group = 'build'
    dependsOn(':workflow-ballerina:build')
    dependsOn(':startSharedTestServer')

    doLast {
        def examplesDir = project.projectDir
        def ballerinaDist = "${project.rootDir}/target/ballerina-runtime"
        def distributionBinPath = "${ballerinaDist}/bin"

        // Clear the workflow BIR cache so the compiler picks up the freshly built bala
        def workflowBirCache = new File("${ballerinaDist}/repo/cache/ballerina/workflow")
        if (workflowBirCache.exists()) {
            workflowBirCache.deleteDir()
        }

        boolean testsExcluded = gradle.startParameter.excludedTaskNames.any {
            it == 'test' || it.endsWith(':test')
        }

        examplesDir.eachDir { exampleDir ->
            def packageName = examplePackageNames[exampleDir.name]
            if (packageName == null) {
                logger.lifecycle("Skipping ${exampleDir.name} (not a registered example)")
                return
            }

            logger.lifecycle("Building example: ${exampleDir.name}")

            // Update Ballerina.toml
            def tomlFile = new File(exampleDir, "Ballerina.toml")
            tomlFile.text = generateExampleToml(packageName)

            // Delete stale Dependencies.toml so it gets regenerated
            def depsToml = new File(exampleDir, "Dependencies.toml")
            if (depsToml.exists()) depsToml.delete()

            // Clean old build artifacts
            def targetDir = new File(exampleDir, "target")
            if (targetDir.exists()) targetDir.deleteDir()

            // Respect Gradle -x test: build examples without running bal tests.
            def balCommand = testsExcluded ? 'build' : 'test'
            exec {
                workingDir exampleDir
                environment "JAVA_OPTS", "-DBALLERINA_DEV_COMPILE_BALLERINA_ORG=true"
                if (Os.isFamily(Os.FAMILY_WINDOWS)) {
                    commandLine 'cmd', '/c', "${distributionBinPath}/bal.bat ${balCommand}"
                } else {
                    commandLine 'sh', '-c', "${distributionBinPath}/bal ${balCommand}"
                }
            }
        }

        logger.lifecycle("All examples built and tested successfully")
    }
}

task runExamples {
    description = 'Runs examples with a main() function via bal run to verify runtime startup'
    group = 'verification'
    dependsOn(buildExamples)

    doLast {
        def ballerinaDist = "${project.rootDir}/target/ballerina-runtime"
        def distributionBinPath = "${ballerinaDist}/bin"

        runnableExamples.each { exampleName ->
            def exampleDir = new File(project.projectDir, exampleName)
            if (!exampleDir.exists()) {
                throw new GradleException("Runnable example not found: ${exampleDir}")
            }

            logger.lifecycle("Running example: ${exampleName}")

            exec {
                workingDir exampleDir
                environment "JAVA_OPTS", "-DBALLERINA_DEV_COMPILE_BALLERINA_ORG=true"
                if (Os.isFamily(Os.FAMILY_WINDOWS)) {
                    commandLine 'cmd', '/c', "${distributionBinPath}/bal.bat run"
                } else {
                    commandLine 'sh', '-c', "${distributionBinPath}/bal run"
                }
            }

            logger.lifecycle("Example ${exampleName} ran successfully")
        }
    }
}

task build {
    dependsOn buildExamples
}

task test {
    description = 'Tests all examples and runs main() smoke tests'
    group = 'verification'
    dependsOn runExamples
}
